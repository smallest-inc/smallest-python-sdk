      +      +        voice_id="magnus",
      +      +        api_key="test-key",
      +      +        pronunciation_dicts=["dict_abc", "dict_def"],
      +      +    )
      +      +    assert config.pronunciation_dicts == ["dict_abc", "dict_def"]
