      +      @@ -1,46 +1,3 @@
      +      -## 4.4.1 - 2026-05-19
      +      -
      +      -* **CLI shipped in the published wheel for the first time.** Previous
      +      -  releases declared `smallestai = "smallestai.cli.main:main"` in
      +      -  `pyproject.toml` but the `smallestai.cli` subpackage was missing
      +      -  from the published wheel — `pip install smallestai` produced no
      +      -  working `smallestai` binary. The CLI module is now part of this
      +      -  repo (with `.fernignore` protection against Fern regen) and ships
      +      -  in 4.4.1. `pip install smallestai && smallestai --help` works.
      +      -
      +      -* **`agent` → `agent-swarm` rename across the framework.** The word
      +      -  "agent" was overloaded: a *Smallest AI platform agent* is the
      +      -  voice persona configured in the console; *what this SDK ships* is
      +      -  code that orchestrates multiple nodes acting as the platform
      +      -  agent's LLM brain — that's a **swarm**, not an agent.
      +      -  Hard rename (no backwards-compat shims):
      +      -
      +      -  | Before | After |
      +      -  | --- | --- |
      +      -  | `smallestai.atoms.agent.*` | `smallestai.atoms.swarm.*` |
      +      -  | `Node` | `SwarmNode` |
      +      -  | `OutputAgentNode` | `OutputSwarmNode` |
      +      -  | `BackgroundAgentNode` | `BackgroundSwarmNode` |
      +      -  | `AgentSession` | `SwarmSession` |
      +      -  | `AtomsApp` | `AtomsSwarmApp` |
      +      -  | `smallestai agent {init,deploy,chat,builds}` | `smallestai agent-swarm ...` |
      +      -
      +      -  Code on 4.4.0 using the old names must update imports + CLI
      +      -  invocations to upgrade.
      +      -
      +      -* **Python floor bumped to 3.9.** The CLI dependencies (`typer >= 0.20`,
      +      -  `tomli-w >= 1.2`) require Python 3.9+. The 3.8 classifier has been
      +      -  removed.
      +      -
      +      -* **New runtime dependencies** (for the CLI): `typer >= 0.20.0`,
      +      -  `rich >= 14.2.0`, `questionary >= 2.1.1`, `tomli >= 2.3.0`,
      +      -  `tomli-w >= 1.2.0`.
      +      -
      +      -* **Unchanged on purpose:** SDK event class names
      +      -  (`SDKAgentReadyEvent`, `SDKAgentSpeakEvent`, etc.) — they're shared
      +      -  with pipecat's wire format and will be addressed separately in
      +      -  coordination with the atoms-platform + pipecat work.
