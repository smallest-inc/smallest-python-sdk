       pyproject.toml                                |   2 +-
       src/smallestai/atoms/crew/events.py           |  75 ++++++++++++
       src/smallestai/atoms/crew/nodes/base.py       |  65 ++++++++--
       .../atoms/crew/nodes/output_crew.py           |  14 ++-
       src/smallestai/atoms/crew/server.py           | 113 +++++++++++++++++-
       src/smallestai/cli/agent_crew.py              |  24 +++-
       src/smallestai/cli/utils.py                   |  65 ++++++++++
       8 files changed, 430 insertions(+), 15 deletions(-)

      diff --git a/changelog.md b/changelog.md
      index 360307c..4122e83 100644
      --- a/changelog.md
      +++ b/changelog.md
      @@ -1,3 +1,90 @@
      +## 4.4.7 - 2026-05-20
      +
      +Two related additions: a customer-defined event for the call's Events
      +timeline, and a four-layer error propagation system that closes the
      +silent-failure hole where a deployed crew's user code (e.g.
      +`SentimentAnalyzer` with a missing `OPENAI_API_KEY`) raised inside
      +`process_event`, the exception was caught by `try/except`, and the
      +only signal was a loguru line in pod stdout that nobody read.
      +
      +### Custom events on the call timeline
      +
      +* **New event: `SDKAgentLogEvent`
      +  (`smallestai.atoms.crew.events.SDKAgentLogEvent`,
      +  `type="agent.log"`).** Customer-defined event for the call's Events
      +  timeline. Any crew node — background or output — emits these to
      +  publish arbitrary state to the orchestrator. The platform stores
      +  each one in ClickHouse via the relay (RabbitMQ → ClickHouse) and
      +  surfaces it in the Events tab of the call detail page, alongside
      +  transcripts, tool calls, and lifecycle markers. Two fields:
      +  `name: str`, `payload: Dict[str, Any]`.
      +
      +  Example::
      +
      +      from smallestai.atoms.crew.events import SDKAgentLogEvent
      +      from smallestai.atoms.crew.nodes import BackgroundCrewNode
      +
      +      class SentimentAnalyzer(BackgroundCrewNode):
      +          async def process_event(self, event):
      +              ...  # classify
      +              await self.send_event(SDKAgentLogEvent(
      +                  name="sentiment",
      +                  payload={"sentiment": "frustrated", "frustration_count": 3},
      +              ))
      +
      +  Output nodes can use it too — e.g. emitting `name="escalation.triggered"`
      +  when the agent decides to transfer the call.
      +
      +### Error propagation (four layers)
      +
      +* **`SDKAgentErrorEvent` schema extended.** New fields:
      +  `severity: Literal["warning", "fatal"]` (default `"warning"`) and
      +  `payload: Dict[str, Any]` (free-form). The orchestrator uses
      +  `severity="fatal"` to mark the call as failed and populate
      +  `failureReason` on the calllog; `"warning"` is recorded on
      +  `errors[]` without failing the call. The SDK auto-populates payload
      +  with `node_name`, `error_class`, and `traceback` when emitting on
      +  your behalf; manual emissions can add any custom keys (e.g.
      +  `customer_id`, `request_id`). Backward-compatible with the existing
      +  message-only emitter — both new fields have defaults.
      +
      +* **Auto-emit on user-code exceptions in `nodes/base.py`.** The
      +  `__process_event_handler_loop` previously wrapped the entire `while`
      +  loop in one try/except — meaning a single exception killed all
      +  further event processing on that node. Now each `process_event`
      +  call is wrapped per-event, with the exception auto-emitting an
      +  `SDKAgentErrorEvent` upstream. Severity is auto-selected by node
      +  type: `BackgroundCrewNode` → `"warning"` (observer, call continues);
      +  every other node type → `"fatal"` (output node, call fails).
      +  Subclasses can override `_error_severity()` to change the default.
      +
      +* **`OutputCrewNode._handle_llm_request` error emission enriched.**
      +  The existing try/except around `generate_response` already emitted
      +  `SDKAgentErrorEvent` but only set `message`. Now also sets
      +  `severity="fatal"` and a payload with `node_name`, `error_class`,
      +  `traceback`.
      +
      +* **`/ready` endpoint + `_validate_startup()` in `AtomsCrewApp`.**
      +  New readiness probe at `GET /ready`. Returns 503 with a structured
      +  reason until the FastAPI startup hook has successfully dry-run the
      +  `setup_handler` against a no-op session. Catches `__init__` failures
      +  (missing env vars in `OpenAIClient.__init__`, bad imports, etc.)
      +  before the pod accepts WebSocket connections. `/health` stays as a
      +  liveness signal (always 200 if the process is up).
      +
      +* **Pre-deploy env var scan in the CLI.** `smallestai agent-crew
      +  deploy` now AST-walks every `.py` file under the build directory
      +  before zipping and prints a warning listing every env var the code
      +  reads via `os.getenv("X")` / `os.environ["X"]` / `os.environ.get("X",
      +  …)`. `SMALLEST_API_KEY` is suppressed (the platform always sets it).
      +
      +Companion: `smallest-inc/pipecat#762` (consolidated) — adds the
      +matching `agent.log` + `agent.error` handling, publishes both to the
      +event bus for relay → RabbitMQ → ClickHouse, and terminates the call
      +on `severity="fatal"`. Without that PR deployed, events reach the
      +orchestrator but the relay → ClickHouse → Events tab pipeline isn't
      +yet wired (UI integration is a separate atoms-platform PR).
      +
       ## 4.4.6 - 2026-05-20
       
       * **Follow-up cleanup after the 4.4.5 `token=` → `api_key=` rename.**
      diff --git a/pyproject.toml b/pyproject.toml
      index d5b3f2b..f12f0d9 100644
      --- a/pyproject.toml
      +++ b/pyproject.toml
      @@ -5,7 +5,7 @@ dynamic = ["version"]
       
       [tool.poetry]
       name = "smallestai"
      -version = "4.4.6"
      +version = "4.4.7"
       description = ""
       readme = "README.md"
       authors = []
      diff --git a/src/smallestai/atoms/crew/events.py b/src/smallestai/atoms/crew/events.py
      index eab7e98..e5dc274 100644
      --- a/src/smallestai/atoms/crew/events.py
      +++ b/src/smallestai/atoms/crew/events.py
      @@ -97,6 +97,7 @@ class EventType(str, Enum):
       
           AGENT_END_CALL = "agent.end_call"
           AGENT_TRANSFER_CONVERSATION = "agent.transfer_call"
      +    AGENT_LOG = "agent.log"
       
       
       class SDKEvent(TypedModel, type=EventType.BASE.value):
      @@ -118,6 +119,49 @@ class SDKAgentTranscriptUpdateEvent(
           content: str
       
       
      +class SDKAgentLogEvent(SDKAgentEvent, type=EventType.AGENT_LOG.value):
      +    """Customer-defined event for the call's Events timeline.
      +
      +    Any crew node — background or output — emits these to publish arbitrary
      +    state to the orchestrator. The platform stores each one in ClickHouse
      +    via the relay (RabbitMQ → ClickHouse) pipeline and surfaces it in the
      +    Events tab of the call detail page, alongside transcripts, tool calls,
      +    and lifecycle markers.
      +
      +    Common use cases:
      +
      +    - Sentiment classifications, intent labels, lead scores
      +    - Escalation triggers, disposition tags, slot-fill completion
      +    - Custom UI markers — "verification passed", "form submitted",
      +      "voicemail detected", "consent recorded"
      +    - Observability cross-references — Langfuse / Datadog / NewRelic trace
      +      URLs that operators can jump to from the call view
      +
      +    Example (background node)::
      +
      +        from smallestai.atoms.crew.events import SDKAgentLogEvent
      +        from smallestai.atoms.crew.nodes import BackgroundCrewNode
      +
      +        class SentimentAnalyzer(BackgroundCrewNode):
      +            async def process_event(self, event):
      +                ...  # classify
      +                await self.send_event(SDKAgentLogEvent(
      +                    name="sentiment",
      +                    payload={"sentiment": "frustrated", "frustration_count": 3},
      +                ))
      +
      +    Example (output node — flagging an escalation)::
      +
      +        await self.send_event(SDKAgentLogEvent(
      +            name="escalation.triggered",
      +            payload={"reason": "frustration_threshold_exceeded"},
      +        ))
      +    """
      +
      +    name: str
      +    payload: Dict[str, Any] = Field(default_factory=dict)
      +
      +
       class SDKAgentEndCallEvent(SDKAgentEvent, type=EventType.AGENT_END_CALL.value):
           pass
       
      @@ -215,7 +259,38 @@ class SDKAgentReadyEvent(SDKAgentEvent, type=EventType.AGENT_READY.value):
       
       
       class SDKAgentErrorEvent(SDKAgentEvent, type=EventType.AGENT_ERROR.value):
      +    """An error from inside the deployed crew.
      +
      +    Emitted automatically by the SDK whenever user code in
      +    `process_event()` / `generate_response()` raises, so the orchestrator
      +    can record it on the call. Customers can also emit these manually
      +    from inside their nodes for app-level errors (validation failures,
      +    upstream API errors, etc.).
      +
      +    The `severity` field controls whether the call is failed:
      +
      +    - `"warning"` (default for BackgroundCrewNode) — recorded on the
      +      call's `errors[]` but the call continues. Use for non-critical
      +      side-channels (sentiment, audit, observability) where the failure
      +      doesn't break the conversation.
      +    - `"fatal"` (default for OutputCrewNode) — recorded on the call's
      +      `errors[]`, the call is marked as failed, and `failureReason` is
      +      populated. Use for the agent itself failing — no point continuing
      +      if the user-facing brain isn't responding.
      +
      +    Auto-populated payload keys when the SDK emits on your behalf:
      +
      +    - `node_name` — which CrewNode raised
      +    - `traceback` — full Python traceback string
      +    - `error_class` — exception class name (e.g. `"OpenAIError"`)
      +
      +    When emitting manually, you can add any other keys (`customer_id`,
      +    `request_id`, etc.) — the relay stores `payload` as JSON.
      +    """
      +
           message: str
      +    severity: Literal["warning", "fatal"] = "warning"
      +    payload: Dict[str, Any] = Field(default_factory=dict)
       
       
       class SDKAgentLLMResponseStartEvent(
      diff --git a/src/smallestai/atoms/crew/nodes/base.py b/src/smallestai/atoms/crew/nodes/base.py
      index a6677a8..4fa1660 100644
      --- a/src/smallestai/atoms/crew/nodes/base.py
      +++ b/src/smallestai/atoms/crew/nodes/base.py
      @@ -5,11 +5,13 @@ Supports tree/graph structures with multiple children and parents.
       """
       
       import asyncio
      +import traceback as _traceback
       from typing import Optional, Set
       
       from loguru import logger
       
       from smallestai.atoms.crew.events import (
      +    SDKAgentErrorEvent,
           SDKEvent,
           SDKSystemControlInterruptEvent,
           SDKSystemInitEvent,
      @@ -144,17 +146,66 @@ class CrewNode:
                   await self._handle_interrupt()
       
           async def __process_event_handler_loop(self):
      -        """Process event handler loop"""
      -        try:
      -            while self._running:
      +        """Process event handler loop.
      +
      +        Each `process_event` call is wrapped in try/except so a single user-code
      +        exception doesn't kill the node's event loop (previously: one exception
      +        would tear down the whole loop and silently stop processing future
      +        events). On error, an `SDKAgentErrorEvent` is emitted upstream so the
      +        orchestrator can record it on the call's `errors[]` and surface it in
      +        the Events tab. Severity is determined by node type:
      +
      +        - `BackgroundCrewNode` subclasses → `severity="warning"` (call continues)
      +        - All other node types (output, custom) → `severity="fatal"` (call fails)
      +        """
      +        while self._running:
      +            try:
                       event = await self._queue.get()
      +            except asyncio.CancelledError:
      +                raise
      +            except Exception:
      +                logger.exception(f"[{self.name}] Error reading from event queue")
      +                continue
       
      -                if event is None:
      -                    break
      +            if event is None:
      +                break
       
      +            try:
                       await self.process_event(event)
      -        except Exception as e:
      -            logger.exception(f"[{self.name}] Unexpected error in processing loop: {e}")
      +            except asyncio.CancelledError:
      +                raise
      +            except Exception as e:
      +                severity = self._error_severity()
      +                tb_str = _traceback.format_exc()
      +                logger.error(
      +                    f"[{self.name}] {severity.upper()} in process_event: "
      +                    f"{type(e).__name__}: {e}\n{tb_str}"
      +                )
      +                try:
