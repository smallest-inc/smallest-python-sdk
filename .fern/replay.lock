    patch_content: |+
      From 904b9e9ad5174a95a0eba2ae7b753a63a84d552b Mon Sep 17 00:00:00 2001
      From: Maharshi Chattopadhyay
       <maharshichattopadhyay@ip-192-168-1-20.ap-south-1.compute.internal>
      Date: Wed, 20 May 2026 16:34:28 +0530
      Subject: [PATCH] feat(crew): SDKAgentLogEvent + error propagation + pre-flight
       validation (4.4.7)
      MIME-Version: 1.0
      Content-Type: text/plain; charset=UTF-8
      Content-Transfer-Encoding: 8bit

      Two related additions: a customer-defined event for the call's Events
      timeline, and a four-layer error propagation system that closes the
      silent-failure hole where a deployed crew's user code (e.g.
      SentimentAnalyzer with a missing OPENAI_API_KEY) raised inside
      process_event, the exception was caught by try/except, and the only
      signal was a loguru line in pod stdout that nobody read.

      ## Custom events on the call timeline

      New event SDKAgentLogEvent (type="agent.log"). Any crew node —
      background or output — emits these to publish arbitrary state
      (sentiment classifications, intent labels, lead scores, escalation
      triggers, observability trace URLs, custom UI markers, etc.) to the
      orchestrator. Two fields: name + payload.

      ## Error propagation (four layers)

      1. **SDKAgentErrorEvent schema extended** with optional severity
         ("warning"/"fatal"), node_name, traceback, error_class. Backward-
         compatible with the existing message-only emitter.

      2. **Auto-emit on user-code exceptions in nodes/base.py.** The
         process_event loop now wraps each event in try/except (previously
         one exception killed the whole loop) and emits SDKAgentErrorEvent
         upstream with severity auto-selected by node type:
         BackgroundCrewNode → "warning" (call continues),
         else → "fatal" (call fails).

      3. **OutputCrewNode generate_response error emission enriched** with
         the new fields so the orchestrator has the full picture.

      4. **/ready endpoint + _validate_startup() in AtomsCrewApp.** New
         readiness probe at GET /ready. Returns 503 until the startup hook
         has successfully dry-run setup_handler against a no-op session.
         Catches __init__ failures before the pod accepts connections.
         /health stays as liveness.

      5. **Pre-deploy env var scan in the CLI.** smallestai agent-crew
         deploy AST-walks every .py file and warns about every os.getenv()
         / os.environ[] reference before zip upload. SMALLEST_API_KEY
         suppressed (platform always sets it).

      Companion: smallest-inc/pipecat#762 (consolidated) — adds the matching
      agent.log + agent.error handling, publishes both to the event bus for
      relay → RabbitMQ → ClickHouse, and terminates the call on
      severity="fatal".

      Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>
      ---
