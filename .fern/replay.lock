    patch_content: |-
      From 0c9e9b4e2286bd64653a1bdeb91a2b871a56668e Mon Sep 17 00:00:00 2001
      From: Maharshi Chattopadhyay
       <maharshichattopadhyay@Maharshis-MacBook-Pro-M4.local>
      Date: Wed, 20 May 2026 05:10:33 +0530
      Subject: [PATCH] refactor: rename agent-swarm -> agent-crew across SDK + CLI
       (4.4.2)
      MIME-Version: 1.0
      Content-Type: text/plain; charset=UTF-8
      Content-Transfer-Encoding: 8bit

      Hard rename across user-facing surfaces, same policy as the previous
      agent -> agent-swarm rename: no backwards-compat shims.

      Module path:
      - smallestai.atoms.swarm -> smallestai.atoms.crew
      - nodes/output_swarm.py -> nodes/output_crew.py
      - nodes/background_swarm.py -> nodes/background_crew.py

      Class names:
      - SwarmNode -> CrewNode
      - OutputSwarmNode -> OutputCrewNode
      - BackgroundSwarmNode -> BackgroundCrewNode
      - SwarmSession -> CrewSession
      - AtomsSwarmApp -> AtomsCrewApp

      CLI:
      - subcommand `smallestai agent-swarm` -> `smallestai agent-crew`
      - smallestai/cli/agent_swarm.py -> smallestai/cli/agent_crew.py
      - initialise_agent_swarm_app -> initialise_agent_crew_app
      - main.py registers the typer sub-app with name="agent-crew"
      - All help / docstring copy updated.

      Also:
      - .fernignore: src/smallestai/atoms/swarm -> src/smallestai/atoms/crew
      - pyproject.toml [tool.mypy] excludes: same swap
      - pyproject.toml [tool.poetry] version: 4.4.0 -> 4.4.2 (4.4.1 was the
        agent-swarm release; 4.4.2 is the crew rename)
      - pyproject.toml: restored [tool.poetry.scripts] smallestai entry that
        Fern regen had dropped — without this the wheel ships the CLI module
        but no console-script binary, just like the original 4.4.0 bug
      - changelog.md: added 4.4.2 entry; restored 4.4.1 entry that Fern regen
        had dropped (4.4.1 IS published on PyPI but was undocumented here)

      Verified: built wheel, installed in fresh venv, `smallestai agent-crew`
      works, all `from smallestai.atoms.crew import ...` imports resolve
      (CrewSession, OutputCrewNode, BackgroundCrewNode, CrewNode, AtomsCrewApp).

      Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>
