          .fern/replay.lock          - this commit
          .fernignore                - this commit
          .fern/metadata.json        - generator timestamp, +0 bytes
          atoms/webhooks/__init__.py - +1 byte trailing newline (cosmetic)

        Zero information loss in source code.
        Python compiles cleanly. pyproject parses. waves/__init__.py has
        the full 7-entry __all__ including shims + PronunciationItem.

      The durable fix for the underlying computePerPatchDiff truncation bug
      in @fern-api/replay will land separately in fern-api/fern-replay.
