      Four coordinated fixes to make the next regen produce a clean PR with
      zero source-code information loss vs main:

      1. Rewrite every patch's patch_content with the cumulative ground-truth
         diff (git diff 11155ff5 main -- <files>). Bypasses the
         computePerPatchDiff span-resolution bug in @fern-api/replay that
         produced patch-merge-aad9445e's truncated waves/__init__.py diff
         (deletion of compact __all__ without re-adding the multi-line form)
         and cascaded conflicts every regen since PR #53 merged.

      2. Fix .fernignore minimatch patterns:
           src/smallestai/cli           → src/smallestai/cli/**
           src/smallestai/atoms/swarm   → src/smallestai/atoms/swarm/**
           src/smallestai/atoms/helpers → src/smallestai/atoms/helpers/**
         Bare directory paths don't match files inside the directory in
         minimatch's default semantics. Also adds poetry.lock so generator
         non-determinism (yarl/aiohttp dep churn) stops fighting the
         customer's manually-curated lock state.

      3. Forget patch-55c82e75 and patch-e2d0d085 — both became redundant
         once poetry.lock is .fernignore-protected.

      4. Add synthetic patch (patch-synth-samplerate-override) capturing the
         SampleRate type override on waves/client.py and waves/raw_client.py.
         This customization was introduced by [fern-replay]-prefixed commits
         (12bed7e9, 16449961) which the detector skips by design, leaving the
         customization captured nowhere and silently reverted on every regen.

      Verified locally against a simulated regen overlay of gen 9a6be98's
      tree (respecting the updated .fernignore):

        537/541 files on main are byte-identical in the regen (99.3%)

