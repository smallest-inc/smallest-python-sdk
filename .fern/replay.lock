      +      @@ -14,7 +14,7 @@ jobs:
      +             - name: Set up python
      +               uses: actions/setup-python@v4
      +               with:
      +      -          python-version: "3.10"
      +      +          python-version: "3.9"
      +             - name: Bootstrap poetry
      +               run: |
      +                 curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      +      @@ -30,7 +30,7 @@ jobs:
